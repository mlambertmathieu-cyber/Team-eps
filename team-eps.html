<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team EPS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #0057FF; --cyan: #00D4FF; --dark: #0A0E1A; --card: #111827;
    --border: #1E2A3A; --text: #E8F0FF; --muted: #5A7090;
    --green: #00E87A; --orange: #FF7A00; --red: #FF3A5C; --yellow: #FFD600;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; padding-bottom:80px; }

  /* LOGIN */
  #login-screen {
    position:fixed; inset:0; background:var(--dark);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:999; padding:30px;
  }
  .login-logo { font-family:'Syne',sans-serif; font-size:40px; font-weight:800; background:linear-gradient(90deg,var(--cyan),var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
  .login-sub { font-size:11px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-bottom:50px; }
  .login-label { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:18px; }
  .user-btns { display:flex; flex-direction:column; gap:12px; width:100%; max-width:280px; }
  .user-btn { padding:16px 20px; border-radius:12px; border:1px solid var(--border); background:var(--card); color:var(--text); font-family:'Syne',sans-serif; font-size:18px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:14px; transition:all 0.2s; }
  .user-btn:active { border-color:var(--cyan); background:rgba(0,212,255,0.05); }
  .user-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800; flex-shrink:0; }
  .av-T { background:rgba(0,87,255,0.2); color:#6699FF; border:1px solid rgba(0,87,255,0.4); }
  .av-S { background:rgba(0,232,122,0.2); color:var(--green); border:1px solid rgba(0,232,122,0.4); }
  .av-M { background:rgba(255,122,0,0.2); color:var(--orange); border:1px solid rgba(255,122,0,0.4); }

  /* APP */
  #app { display:none; }
  #app.visible { display:block; }

  header { background:linear-gradient(135deg,#0A0E1A,#0D1529); border-bottom:1px solid var(--border); padding:12px 16px; position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; }
  .header-left { display:flex; align-items:center; gap:8px; }
  .logo { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; background:linear-gradient(90deg,var(--cyan),var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--yellow); display:inline-block; }
  .sync-dot.ok { background:var(--green); animation:pulse 2s infinite; }
  .sync-dot.err { background:var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .header-right { display:flex; align-items:center; gap:8px; }
  .badges { display:flex; gap:6px; }
  .badge { font-size:10px; padding:3px 8px; border-radius:20px; font-weight:500; }
  .badge-cmd { background:rgba(0,87,255,0.15); color:var(--blue); border:1px solid rgba(0,87,255,0.3); }
  .badge-sav { background:rgba(255,122,0,0.15); color:var(--orange); border:1px solid rgba(255,122,0,0.3); }
  .user-pill { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:20px; padding:3px 10px 3px 4px; cursor:pointer; }
  .mini-av { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; }
  .user-pill span { font-size:12px; }

  .tabs { display:flex; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:57px; z-index:99; }
  .tab { flex:1; padding:13px; text-align:center; font-size:11px; font-weight:500; letter-spacing:1.5px; cursor:pointer; border:none; background:transparent; color:var(--muted); transition:all 0.2s; border-bottom:2px solid transparent; text-transform:uppercase; }
  .tab.active { color:var(--cyan); border-bottom-color:var(--cyan); }

  .section { display:none; padding:14px; }
  .section.active { display:block; }

  .add-btn { width:100%; padding:13px; background:linear-gradient(90deg,var(--blue),#0044CC); border:none; border-radius:10px; color:white; font-family:'DM Mono',monospace; font-size:13px; font-weight:500; cursor:pointer; margin-bottom:14px; letter-spacing:1px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .add-btn.sav-btn { background:linear-gradient(90deg,var(--orange),#CC5500); }

  .filters { display:flex; gap:8px; margin-bottom:13px; overflow-x:auto; padding-bottom:4px; }
  .filter-btn { padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
  .filter-btn.active { background:rgba(0,212,255,0.1); border-color:var(--cyan); color:var(--cyan); }

  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:13px; margin-bottom:10px; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; left:0;top:0;bottom:0; width:3px; border-radius:3px 0 0 3px; }
  .card.u-haute::before { background:var(--red); }
  .card.u-normale::before { background:var(--blue); }
  .card.u-basse::before { background:var(--muted); }
  .card.s-apl::before { background:var(--orange); }
  .card.s-enc::before { background:var(--yellow); }
  .card.s-ter::before { background:var(--green); }

  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:7px; }
  .card-client { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; flex:1; margin-right:8px; }
  .card-actions { display:flex; gap:5px; }
  .btn-icon { background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:6px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; }
  .card-detail { font-size:12px; color:var(--muted); margin-bottom:3px; line-height:1.5; }
  .card-detail strong { color:var(--text); }
  .card-tags { display:flex; gap:6px; margin-top:9px; flex-wrap:wrap; }
  .tag { font-size:10px; padding:3px 8px; border-radius:20px; letter-spacing:0.8px; text-transform:uppercase; font-weight:500; }
  .t-urg-h { background:rgba(255,58,92,0.15); color:var(--red); border:1px solid rgba(255,58,92,0.3); }
  .t-urg-n { background:rgba(0,87,255,0.15); color:#6699FF; border:1px solid rgba(0,87,255,0.3); }
  .t-urg-b { background:rgba(90,112,144,0.15); color:var(--muted); border:1px solid rgba(90,112,144,0.3); }
  .t-ac { background:rgba(255,214,0,0.15); color:var(--yellow); border:1px solid rgba(255,214,0,0.3); }
  .t-cmd { background:rgba(0,87,255,0.15); color:#6699FF; border:1px solid rgba(0,87,255,0.3); }
  .t-recu { background:rgba(0,232,122,0.15); color:var(--green); border:1px solid rgba(0,232,122,0.3); }
  .t-apl { background:rgba(255,122,0,0.15); color:var(--orange); border:1px solid rgba(255,122,0,0.3); }
  .t-enc { background:rgba(255,214,0,0.15); color:var(--yellow); border:1px solid rgba(255,214,0,0.3); }
  .t-ter { background:rgba(0,232,122,0.15); color:var(--green); border:1px solid rgba(0,232,122,0.3); }
  .t-tech { background:rgba(0,212,255,0.1); color:var(--cyan); border:1px solid rgba(0,212,255,0.2); }
  .t-muted { background:rgba(255,255,255,0.05); color:var(--muted); border:1px solid var(--border); }

  .card-photos { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .card-photo-thumb { width:70px; height:70px; border-radius:8px; object-fit:cover; border:1px solid var(--border); cursor:pointer; }
  .card-photo-more { width:70px; height:70px; border-radius:8px; background:rgba(255,255,255,0.06); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--muted); cursor:pointer; }

  .empty { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; }
  .empty .icon { font-size:32px; margin-bottom:10px; }
  .loading { text-align:center; padding:30px; color:var(--muted); font-size:12px; }

  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; align-items:flex-end; justify-content:center; }
  .modal-bg.open { display:flex; }
  .modal { background:#111827; border:1px solid var(--border); border-radius:20px 20px 0 0; padding:20px; width:100%; max-width:600px; max-height:90vh; overflow-y:auto; animation:slideUp 0.25s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-title { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .field { margin-bottom:13px; }
  .field label { display:block; font-size:11px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:5px; }
  .field input,.field select,.field textarea { width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Mono',monospace; font-size:13px; padding:10px 12px; outline:none; transition:border-color 0.2s; }
  .field input:focus,.field select:focus,.field textarea:focus { border-color:var(--cyan); }
  .field select option { background:#111827; }
  .field textarea { resize:none; height:66px; }

  .photo-upload-zone { border:2px dashed var(--border); border-radius:10px; padding:14px; text-align:center; cursor:pointer; position:relative; }
  .photo-upload-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .photo-upload-zone .upload-icon { font-size:22px; margin-bottom:5px; }
  .photo-upload-zone .upload-label { font-size:12px; color:var(--muted); pointer-events:none; }

  .photo-preview-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .photo-preview-item { position:relative; width:78px; height:78px; }
  .photo-preview-item img { width:78px; height:78px; object-fit:cover; border-radius:8px; border:1px solid var(--border); }
  .remove-photo { position:absolute; top:-6px; right:-6px; width:20px; height:20px; background:var(--red); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; cursor:pointer; border:none; color:white; font-weight:bold; }

  .modal-btns { display:flex; gap:10px; margin-top:16px; }
  .btn-cancel { flex:1; padding:12px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-family:'DM Mono',monospace; font-size:13px; cursor:pointer; }
  .btn-save { flex:2; padding:12px; background:linear-gradient(90deg,var(--blue),#0044CC); border:none; border-radius:8px; color:white; font-family:'DM Mono',monospace; font-size:13px; font-weight:500; cursor:pointer; }
  .btn-save.sav { background:linear-gradient(90deg,var(--orange),#CC5500); }
  .btn-save:disabled { opacity:0.5; cursor:not-allowed; }

  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:#0D1225; border-top:1px solid var(--border); display:flex; padding:8px 0; z-index:100; }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px; cursor:pointer; color:var(--muted); font-size:10px; letter-spacing:1px; text-transform:uppercase; border:none; background:transparent; font-family:'DM Mono',monospace; }
  .nav-item .nav-icon { font-size:20px; }
  .nav-item.active { color:var(--cyan); }

  .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:400; flex-direction:column; align-items:center; justify-content:center; }
  .lightbox.open { display:flex; }
  .lightbox-img { max-width:96vw; max-height:80vh; object-fit:contain; border-radius:10px; }
  .lightbox-nav { display:flex; align-items:center; gap:20px; margin-top:16px; }
  .lightbox-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:8px; color:white; padding:10px 18px; font-family:'DM Mono',monospace; font-size:16px; cursor:pointer; }
  .lightbox-counter { color:var(--muted); font-size:12px; min-width:60px; text-align:center; }
  .lightbox-close { position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.1); border:none; border-radius:50%; width:36px; height:36px; color:white; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">Team EPS</div>
  <div class="login-sub">Gestion chantiers piscine</div>
  <div class="login-label">Qui êtes-vous ?</div>
  <div class="user-btns">
    <button class="user-btn" onclick="login('Thomas')"><div class="user-avatar av-T">T</div>Thomas</button>
    <button class="user-btn" onclick="login('Swann')"><div class="user-avatar av-S">S</div>Swann</button>
    <button class="user-btn" onclick="login('Mathieu')"><div class="user-avatar av-M">M</div>Mathieu</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="logo">Team EPS</div>
      <span class="sync-dot" id="sync-dot" title="Synchronisation"></span>
    </div>
    <div class="header-right">
      <div class="badges">
        <span class="badge badge-cmd" id="badge-cmd">—</span>
        <span class="badge badge-sav" id="badge-sav">—</span>
      </div>
      <div class="user-pill" onclick="logout()">
        <div class="mini-av" id="header-av"></div>
        <span id="header-name"></span>
      </div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('commandes')">📦 Commandes</button>
    <button class="tab" onclick="switchTab('sav')">🔧 SAV / Interventions</button>
  </div>

  <div class="section active" id="section-commandes">
    <button class="add-btn" onclick="openModal('commande')">+ Nouvelle commande</button>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('cmd','tous',this)">Tous</button>
      <button class="filter-btn" onclick="setFilter('cmd','à commander',this)">À commander</button>
      <button class="filter-btn" onclick="setFilter('cmd','commandé',this)">Commandé</button>
      <button class="filter-btn" onclick="setFilter('cmd','reçu',this)">Reçu</button>
    </div>
    <div id="list-commandes"><div class="loading">Connexion à Firebase…</div></div>
  </div>

  <div class="section" id="section-sav">
    <button class="add-btn sav-btn" onclick="openModal('sav')">+ Nouvelle intervention</button>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('sav','tous',this)">Tous</button>
      <button class="filter-btn" onclick="setFilter('sav','à planifier',this)">À planifier</button>
      <button class="filter-btn" onclick="setFilter('sav','en cours',this)">En cours</button>
      <button class="filter-btn" onclick="setFilter('sav','terminé',this)">Terminé</button>
    </div>
    <div id="list-sav"><div class="loading">Connexion à Firebase…</div></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-commandes" onclick="switchTab('commandes')"><span class="nav-icon">📦</span>Commandes</button>
    <button class="nav-item" id="nav-sav" onclick="switchTab('sav')"><span class="nav-icon">🔧</span>SAV</button>
  </nav>
</div>

<!-- MODAL COMMANDE -->
<div class="modal-bg" id="modal-commande">
  <div class="modal">
    <div class="modal-title" id="title-cmd">📦 Nouvelle commande</div>
    <div class="field"><label>Client / Chantier</label><input id="cmd-client" type="text" placeholder="Ex: M. Dupont - Résidence Les Pins"></div>
    <div class="field"><label>Article(s)</label><textarea id="cmd-article" placeholder="Ex: Pompe Hayward 1cv, joints..."></textarea></div>
    <div class="field"><label>Quantité</label><input id="cmd-qte" type="text" placeholder="Ex: 2x, 1 sac..."></div>
    <div class="field"><label>Urgence</label>
      <select id="cmd-urgence">
        <option value="haute">🔴 Haute — bloque le chantier</option>
        <option value="normale" selected>🔵 Normale</option>
        <option value="basse">⚫ Basse — pas pressé</option>
      </select>
    </div>
    <div class="field"><label>Statut</label>
      <select id="cmd-statut">
        <option value="à commander" selected>À commander</option>
        <option value="commandé">Commandé</option>
        <option value="reçu">Reçu</option>
      </select>
    </div>
    <div class="field"><label>Note</label><textarea id="cmd-note" placeholder="Référence, fournisseur..."></textarea></div>
    <div class="field">
      <label>Photos</label>
      <div class="photo-upload-zone">
        <input type="file" accept="image/*" multiple id="cmd-photo-input" onchange="handlePhotos('cmd',this)">
        <div class="upload-icon">📷</div>
        <div class="upload-label">Photo ou galerie</div>
      </div>
      <div class="photo-preview-grid" id="cmd-preview-grid"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('commande')">Annuler</button>
      <button class="btn-save" id="btn-cmd" onclick="saveCommande()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL SAV -->
<div class="modal-bg" id="modal-sav">
  <div class="modal">
    <div class="modal-title" id="title-sav">🔧 Nouvelle intervention</div>
    <div class="field"><label>Client</label><input id="sav-client" type="text" placeholder="Ex: Mme Martin - Villa Azure"></div>
    <div class="field"><label>Problème constaté</label><textarea id="sav-probleme" placeholder="Ex: Fuite sur le raccord..."></textarea></div>
    <div class="field"><label>Technicien assigné</label>
      <select id="sav-tech">
        <option value="">— Non assigné</option>
        <option value="Thomas">Thomas</option>
        <option value="Swann">Swann</option>
        <option value="Mathieu">Mathieu</option>
      </select>
    </div>
    <div class="field"><label>Date prévue</label><input id="sav-date" type="date"></div>
    <div class="field"><label>Statut</label>
      <select id="sav-statut">
        <option value="à planifier" selected>À planifier</option>
        <option value="en cours">En cours</option>
        <option value="terminé">Terminé</option>
      </select>
    </div>
    <div class="field"><label>Note</label><textarea id="sav-note" placeholder="Pièces nécessaires, accès, code portail..."></textarea></div>
    <div class="field">
      <label>Photos</label>
      <div class="photo-upload-zone">
        <input type="file" accept="image/*" multiple id="sav-photo-input" onchange="handlePhotos('sav',this)">
        <div class="upload-icon">📷</div>
        <div class="upload-label">Photo ou galerie</div>
      </div>
      <div class="photo-preview-grid" id="sav-preview-grid"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('sav')">Annuler</button>
      <button class="btn-save sav" id="btn-sav" onclick="saveSav()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
  <div class="lightbox-nav">
    <button class="lightbox-btn" onclick="lbNav(-1)">←</button>
    <span class="lightbox-counter" id="lightbox-counter"></span>
    <button class="lightbox-btn" onclick="lbNav(1)">→</button>
  </div>
</div>

<script>
  // ── CONFIG FIREBASE REST ──────────────────────────────────────
  const DB = 'https://team-eps-c8a5c-default-rtdb.europe-west1.firebasedatabase.app';

  async function fbGet(path) {
    const r = await fetch(DB + path + '.json');
    return r.ok ? r.json() : null;
  }
  async function fbPost(path, data) {
    const r = await fetch(DB + path + '.json', { method:'POST', body:JSON.stringify(data) });
    return r.json();
  }
  async function fbPatch(path, data) {
    await fetch(DB + path + '.json', { method:'PATCH', body:JSON.stringify(data) });
  }
  async function fbDelete(path) {
    await fetch(DB + path + '.json', { method:'DELETE' });
  }

  // ── STATE ────────────────────────────────────────────────────
  let currentUser = localStorage.getItem('eps-user') || null;
  let commandes = {}, savs = {};
  let filterCmd = 'tous', filterSav = 'tous';
  let editId = null;
  let tempPhotos = { cmd:[], sav:[] };
  let lbPhotos = [], lbIdx = 0;
  let pollTimer = null;

  const avClass = { Thomas:'av-T', Swann:'av-S', Mathieu:'av-M' };

  // ── LOGIN ────────────────────────────────────────────────────
  function login(name) {
    currentUser = name;
    localStorage.setItem('eps-user', name);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    setHeaderUser();
    startPolling();
  }

  function logout() {
    if (!confirm("Changer d'utilisateur ?")) return;
    localStorage.removeItem('eps-user');
    location.reload();
  }

  function setHeaderUser() {
    const av = document.getElementById('header-av');
    av.className = 'mini-av ' + (avClass[currentUser] || '');
    av.textContent = currentUser[0];
    document.getElementById('header-name').textContent = currentUser;
  }

  if (currentUser) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    setHeaderUser();
    startPolling();
  }

  // ── POLLING (synchronisation toutes les 5s) ───────────────────
  async function fetchAll() {
    try {
      const [c, s] = await Promise.all([fbGet('/commandes'), fbGet('/savs')]);
      commandes = c || {};
      savs = s || {};
      renderCommandes();
      renderSavs();
      document.getElementById('sync-dot').className = 'sync-dot ok';
    } catch(e) {
      document.getElementById('sync-dot').className = 'sync-dot err';
    }
  }

  function startPolling() {
    fetchAll();
    pollTimer = setInterval(fetchAll, 5000);
  }

  // ── TABS ─────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('section-' + tab).classList.add('active');
    document.querySelector('.tab[onclick="switchTab(\'' + tab + '\')"]').classList.add('active');
    document.getElementById('nav-' + tab).classList.add('active');
  }

  // ── MODALS ───────────────────────────────────────────────────
  function openModal(type) {
    editId = null;
    const p = type === 'commande' ? 'cmd' : 'sav';
    tempPhotos[p] = [];
    renderPreview(p);
    if (type === 'commande') {
      ['cmd-client','cmd-article','cmd-qte','cmd-note'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('cmd-urgence').value = 'normale';
      document.getElementById('cmd-statut').value = 'à commander';
      document.getElementById('cmd-photo-input').value = '';
      document.getElementById('title-cmd').textContent = '📦 Nouvelle commande';
    } else {
      ['sav-client','sav-probleme','sav-note'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('sav-tech').value = '';
      document.getElementById('sav-date').value = '';
      document.getElementById('sav-statut').value = 'à planifier';
      document.getElementById('sav-photo-input').value = '';
      document.getElementById('title-sav').textContent = '🔧 Nouvelle intervention';
    }
    document.getElementById('modal-' + type).classList.add('open');
  }

  function openEdit(type, id) {
    editId = id;
    if (type === 'commande') {
      const c = commandes[id];
      tempPhotos['cmd'] = c.photos ? [...c.photos] : [];
      document.getElementById('cmd-client').value = c.client || '';
      document.getElementById('cmd-article').value = c.article || '';
      document.getElementById('cmd-qte').value = c.qte || '';
      document.getElementById('cmd-urgence').value = c.urgence || 'normale';
      document.getElementById('cmd-statut').value = c.statut || 'à commander';
      document.getElementById('cmd-note').value = c.note || '';
      document.getElementById('cmd-photo-input').value = '';
      document.getElementById('title-cmd').textContent = '✏️ Modifier commande';
      renderPreview('cmd');
      document.getElementById('modal-commande').classList.add('open');
    } else {
      const s = savs[id];
      tempPhotos['sav'] = s.photos ? [...s.photos] : [];
      document.getElementById('sav-client').value = s.client || '';
      document.getElementById('sav-probleme').value = s.probleme || '';
      document.getElementById('sav-tech').value = s.tech || '';
      document.getElementById('sav-date').value = s.date || '';
      document.getElementById('sav-statut').value = s.statut || 'à planifier';
      document.getElementById('sav-note').value = s.note || '';
      document.getElementById('sav-photo-input').value = '';
      document.getElementById('title-sav').textContent = '✏️ Modifier intervention';
      renderPreview('sav');
      document.getElementById('modal-sav').classList.add('open');
    }
  }

  function closeModal(type) {
    document.getElementById('modal-' + type).classList.remove('open');
  }

  // ── PHOTOS ───────────────────────────────────────────────────
  function handlePhotos(prefix, input) {
    const files = Array.from(input.files);
    Promise.all(files.map(f => new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX = 800;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else { w = Math.round(w * MAX / h); h = MAX; }
          }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          res(canvas.toDataURL('image/jpeg', 0.72));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(f);
    }))).then(results => { tempPhotos[prefix].push(...results); renderPreview(prefix); });
  }

  function removePhoto(prefix, i) { tempPhotos[prefix].splice(i, 1); renderPreview(prefix); }

  function renderPreview(prefix) {
    document.getElementById(prefix + '-preview-grid').innerHTML =
      tempPhotos[prefix].map((src, i) => `
        <div class="photo-preview-item">
          <img src="${src}">
          <button class="remove-photo" onclick="removePhoto('${prefix}',${i})">✕</button>
        </div>`).join('');
  }

  // ── SAVE ─────────────────────────────────────────────────────
  async function saveCommande() {
    const btn = document.getElementById('btn-cmd');
    btn.disabled = true; btn.textContent = 'Enregistrement…';
    const obj = {
      client: document.getElementById('cmd-client').value || 'Sans nom',
      article: document.getElementById('cmd-article').value,
      qte: document.getElementById('cmd-qte').value,
      urgence: document.getElementById('cmd-urgence').value,
      statut: document.getElementById('cmd-statut').value,
      note: document.getElementById('cmd-note').value,
      photos: tempPhotos['cmd'],
      createdBy: currentUser,
      date: new Date().toLocaleDateString('fr-FR'),
      ts: Date.now()
    };
    try {
      if (editId) await fbPatch('/commandes/' + editId, obj);
      else await fbPost('/commandes', obj);
      closeModal('commande');
      await fetchAll();
    } catch(e) { alert('Erreur réseau : ' + e.message); }
    btn.disabled = false; btn.textContent = 'Enregistrer';
  }

  async function saveSav() {
    const btn = document.getElementById('btn-sav');
    btn.disabled = true; btn.textContent = 'Enregistrement…';
    const obj = {
      client: document.getElementById('sav-client').value || 'Sans nom',
      probleme: document.getElementById('sav-probleme').value,
      tech: document.getElementById('sav-tech').value,
      date: document.getElementById('sav-date').value,
      statut: document.getElementById('sav-statut').value,
      note: document.getElementById('sav-note').value,
      photos: tempPhotos['sav'],
      createdBy: currentUser,
      created: new Date().toLocaleDateString('fr-FR'),
      ts: Date.now()
    };
    try {
      if (editId) await fbPatch('/savs/' + editId, obj);
      else await fbPost('/savs', obj);
      closeModal('sav');
      await fetchAll();
    } catch(e) { alert('Erreur réseau : ' + e.message); }
    btn.disabled = false; btn.textContent = 'Enregistrer';
  }

  async function deleteItem(type, id) {
    if (!confirm('Supprimer cette fiche ?')) return;
    await fbDelete('/' + (type === 'commande' ? 'commandes' : 'savs') + '/' + id);
    await fetchAll();
  }

  function setFilter(type, val, btn) {
    if (type === 'cmd') filterCmd = val; else filterSav = val;
    btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (type === 'cmd') renderCommandes(); else renderSavs();
  }

  // ── RENDER ───────────────────────────────────────────────────
  function urgTag(u) {
    const m = { haute:['t-urg-h','🔴 Haute'], normale:['t-urg-n','🔵 Normale'], basse:['t-urg-b','⚫ Basse'] };
    const [c,l] = m[u]||['t-muted',u];
    return `<span class="tag ${c}">${l}</span>`;
  }
  function cmdStatTag(s) {
    const m = { 'à commander':'t-ac', 'commandé':'t-cmd', 'reçu':'t-recu' };
    return `<span class="tag ${m[s]||'t-muted'}">${s}</span>`;
  }
  function savStatTag(s) {
    const m = { 'à planifier':'t-apl', 'en cours':'t-enc', 'terminé':'t-ter' };
    return `<span class="tag ${m[s]||'t-muted'}">${s}</span>`;
  }
  function fmtDate(d) { if(!d) return ''; const [y,m,day]=d.split('-'); return day+'/'+m+'/'+y; }

  function photoGrid(photos) {
    if (!photos || !photos.length) return '';
    const shown = photos.slice(0,3), extra = photos.length-3;
    const enc = encodeURIComponent(JSON.stringify(photos));
    return `<div class="card-photos">
      ${shown.map((s,i) => `<img class="card-photo-thumb" src="${s}" onclick="openLb('${enc}',${i})">`).join('')}
      ${extra>0?`<div class="card-photo-more" onclick="openLb('${enc}',3)">+${extra}</div>`:''}
    </div>`;
  }

  function renderCommandes() {
    const list = document.getElementById('list-commandes');
    const all = Object.entries(commandes).map(([id,v])=>({...v,id})).sort((a,b)=>(b.ts||0)-(a.ts||0));
    const filtered = filterCmd==='tous' ? all : all.filter(c=>c.statut===filterCmd);
    document.getElementById('badge-cmd').textContent = all.filter(c=>c.statut!=='reçu').length + ' cmd';
    if (!filtered.length) { list.innerHTML=`<div class="empty"><div class="icon">📦</div>Aucune commande${filterCmd!=='tous'?' ici':''}</div>`; return; }
    list.innerHTML = filtered.map(c=>`
      <div class="card u-${c.urgence||'normale'}">
        <div class="card-top">
          <div class="card-client">${c.client}</div>
          <div class="card-actions">
            <button class="btn-icon" onclick="openEdit('commande','${c.id}')">✏️</button>
            <button class="btn-icon" onclick="deleteItem('commande','${c.id}')">🗑️</button>
          </div>
        </div>
        ${c.article?`<div class="card-detail"><strong>${c.article}</strong></div>`:''}
        ${c.qte?`<div class="card-detail">Qté : <strong>${c.qte}</strong></div>`:''}
        ${c.note?`<div class="card-detail">${c.note}</div>`:''}
        ${photoGrid(c.photos)}
        <div class="card-tags">
          ${urgTag(c.urgence)} ${cmdStatTag(c.statut)}
          ${c.date?`<span class="tag t-muted">${c.date}</span>`:''}
          ${c.createdBy?`<span class="tag t-muted">✍️ ${c.createdBy}</span>`:''}
        </div>
      </div>`).join('');
  }

  function renderSavs() {
    const list = document.getElementById('list-sav');
    const all = Object.entries(savs).map(([id,v])=>({...v,id})).sort((a,b)=>(b.ts||0)-(a.ts||0));
    const filtered = filterSav==='tous' ? all : all.filter(s=>s.statut===filterSav);
    document.getElementById('badge-sav').textContent = all.filter(s=>s.statut!=='terminé').length + ' sav';
    const scls = { 'à planifier':'s-apl', 'en cours':'s-enc', 'terminé':'s-ter' };
    if (!filtered.length) { list.innerHTML=`<div class="empty"><div class="icon">🔧</div>Aucune intervention${filterSav!=='tous'?' ici':''}</div>`; return; }
    list.innerHTML = filtered.map(s=>`
      <div class="card ${scls[s.statut]||''}">
        <div class="card-top">
          <div class="card-client">${s.client}</div>
          <div class="card-actions">
            <button class="btn-icon" onclick="openEdit('sav','${s.id}')">✏️</button>
            <button class="btn-icon" onclick="deleteItem('sav','${s.id}')">🗑️</button>
          </div>
        </div>
        ${s.probleme?`<div class="card-detail"><strong>${s.probleme}</strong></div>`:''}
        ${s.date?`<div class="card-detail">📅 Prévu le <strong>${fmtDate(s.date)}</strong></div>`:''}
        ${s.note?`<div class="card-detail">${s.note}</div>`:''}
        ${photoGrid(s.photos)}
        <div class="card-tags">
          ${savStatTag(s.statut)}
          ${s.tech?`<span class="tag t-tech">👷 ${s.tech}</span>`:''}
          ${s.createdBy?`<span class="tag t-muted">✍️ ${s.createdBy}</span>`:''}
        </div>
      </div>`).join('');
  }

  // ── LIGHTBOX ─────────────────────────────────────────────────
  function openLb(enc, idx) {
    lbPhotos = JSON.parse(decodeURIComponent(enc)); lbIdx = idx;
    document.getElementById('lightbox-img').src = lbPhotos[lbIdx];
    document.getElementById('lightbox-counter').textContent = (lbIdx+1)+' / '+lbPhotos.length;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
  function lbNav(dir) {
    lbIdx = (lbIdx+dir+lbPhotos.length)%lbPhotos.length;
    document.getElementById('lightbox-img').src = lbPhotos[lbIdx];
    document.getElementById('lightbox-counter').textContent = (lbIdx+1)+' / '+lbPhotos.length;
  }

  document.querySelectorAll('.modal-bg').forEach(bg => bg.addEventListener('click', e => { if(e.target===bg) bg.classList.remove('open'); }));
  let tx=0;
  document.getElementById('lightbox').addEventListener('touchstart', e => { tx=e.touches[0].clientX; });
  document.getElementById('lightbox').addEventListener('touchend', e => { const d=tx-e.changedTouches[0].clientX; if(Math.abs(d)>50) lbNav(d>0?1:-1); });
</script>
</body>
