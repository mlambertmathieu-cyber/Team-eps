<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team EPS</title>
<!-- FIX: <link> non-bloquant au lieu de @import qui gelait la page -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#0057FF;--cyan:#00D4FF;--dark:#0A0E1A;--card:#111827;
  --border:#1E2A3A;--text:#E8F0FF;--muted:#5A7090;
  --green:#00E87A;--orange:#FF7A00;--red:#FF3A5C;--yellow:#FFD600;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--dark);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;padding-bottom:90px;}

/* ── LOGIN ── */
#login{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:32px;}
.login-logo{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;background:linear-gradient(90deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:60px;}
.login-who{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
.user-list{display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px;}
.user-btn{padding:18px 20px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'Syne',sans-serif;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:14px;}
.user-btn:active{border-color:var(--cyan);background:rgba(0,212,255,.05);}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0;}
.av-T{background:rgba(0,87,255,.2);color:#6699FF;border:1px solid rgba(0,87,255,.4);}
.av-S{background:rgba(0,232,122,.2);color:var(--green);border:1px solid rgba(0,232,122,.4);}
.av-M{background:rgba(255,122,0,.2);color:var(--orange);border:1px solid rgba(255,122,0,.4);}

/* ── APP ── */
#app{display:none;}
#app.on{display:block;}

/* ── HEADER ── */
header{background:linear-gradient(135deg,#0A0E1A,#0D1529);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(90deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--yellow);display:inline-block;flex-shrink:0;}
.sync-dot.ok{background:var(--green);animation:pulse 2s infinite;}
.sync-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.upill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;padding:4px 12px 4px 5px;cursor:pointer;}
.mav{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
.upill span{font-size:12px;}

/* ── TABS ── */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:59px;z-index:99;}
.tab{flex:1;padding:13px 4px;text-align:center;font-size:10px;font-weight:500;letter-spacing:1px;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;text-transform:uppercase;font-family:'DM Mono',monospace;position:relative;}
.tab.on{color:var(--cyan);border-bottom-color:var(--cyan);}
.tab-badge{position:absolute;top:6px;right:10px;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center;}

.sec{display:none;padding:14px;}
.sec.on{display:block;}

/* ── SEARCH BAR ── */
.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;padding:12px 14px 12px 40px;outline:none;}
.search-wrap input:focus{border-color:var(--cyan);}
.search-wrap input::placeholder{color:var(--muted);}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;}

/* ── DASHBOARD ── */
.dash-section{margin-bottom:22px;}
.dash-title{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.dash-count{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--text);}

/* ── FILTER BUTTONS ── */
.fb{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .2s;}
.fb.on{background:rgba(0,212,255,.1);border-color:var(--cyan);color:var(--cyan);}

/* ── SAV CARD ── */
.sav-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:8px;position:relative;overflow:hidden;cursor:pointer;}
.sav-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.sav-card.st-planifier::before{background:var(--orange);}
.sav-card.st-encours::before{background:var(--yellow);}
.sav-card.urgent::before{background:var(--red);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.sav-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.sav-client{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;flex:1;}
.sav-statut{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;flex-shrink:0;}
.st-tag-planifier{background:rgba(255,122,0,.15);color:var(--orange);border:1px solid rgba(255,122,0,.3);}
.st-tag-encours{background:rgba(255,214,0,.15);color:var(--yellow);border:1px solid rgba(255,214,0,.3);}
.sav-action{font-size:13px;color:var(--text);margin-bottom:4px;line-height:1.4;}
.sav-meta{font-size:11px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;}
.alert-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:20px;margin-top:5px;}
.alert-rouge{background:rgba(255,58,92,.15);color:var(--red);border:1px solid rgba(255,58,92,.3);}
.alert-orange{background:rgba(255,122,0,.15);color:var(--orange);border:1px solid rgba(255,122,0,.3);}

/* ── CMD CARD ── */
.cmd-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:8px;position:relative;overflow:hidden;}
.cmd-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
/* FIX: classes urgence alignées sur les nouvelles valeurs express/standard */
.cmd-card.urg-express::before{background:var(--red);animation:blink 1.2s infinite;}
.cmd-card.urg-standard::before{background:var(--blue);}
.cmd-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px;}
.cmd-client{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;flex:1;}
.cmd-st-tag{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;flex-shrink:0;}
.cst-ac{background:rgba(255,214,0,.15);color:var(--yellow);border:1px solid rgba(255,214,0,.3);}
.cst-co{background:rgba(0,87,255,.15);color:#6699FF;border:1px solid rgba(0,87,255,.3);}
.cmd-article{font-size:13px;color:var(--text);margin-bottom:3px;}
.cmd-meta{font-size:11px;color:var(--muted);}

/* ── ACTION BUTTONS SUR CARTE ── */
.card-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.act-btn{flex:1;padding:9px;border:none;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;font-weight:500;letter-spacing:.5px;}
.act-btn:active{opacity:.7;}
.act-planifier{background:rgba(255,122,0,.15);color:var(--orange);border:1px solid rgba(255,122,0,.3);}
.act-encours{background:rgba(255,214,0,.15);color:var(--yellow);border:1px solid rgba(255,214,0,.3);}
.act-termine{background:rgba(0,232,122,.15);color:var(--green);border:1px solid rgba(0,232,122,.3);}
.act-recu{background:rgba(0,232,122,.15);color:var(--green);border:1px solid rgba(0,232,122,.3);}
.act-edit{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border);}
.act-del{background:rgba(255,58,92,.1);color:var(--red);border:1px solid rgba(255,58,92,.2);}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
.empty .ei{font-size:36px;margin-bottom:10px;}

/* ── FAB ── */
.fab{position:fixed;bottom:82px;right:16px;width:58px;height:58px;background:linear-gradient(135deg,var(--cyan),var(--blue));border:none;border-radius:50%;font-size:28px;color:#fff;cursor:pointer;z-index:150;box-shadow:0 4px 20px rgba(0,87,255,.4);display:flex;align-items:center;justify-content:center;}
.fab:active{transform:scale(.93);}

/* ── FAB MENU ── */
.fab-menu{position:fixed;bottom:150px;right:16px;display:flex;flex-direction:column;gap:10px;z-index:149;opacity:0;pointer-events:none;transform:translateY(20px);transition:all .2s ease;}
.fab-menu.on{opacity:1;pointer-events:all;transform:translateY(0);}
.fab-item{display:flex;align-items:center;gap:10px;justify-content:flex-end;}
.fab-label{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;white-space:nowrap;}
.fab-ico{width:44px;height:44px;border-radius:50%;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fab-ico:active{opacity:.7;}
.fab-sav{background:linear-gradient(135deg,var(--orange),#CC5500);}
.fab-cmd{background:linear-gradient(135deg,var(--blue),#0044CC);}
.fab-cli{background:linear-gradient(135deg,#1a1a3e,#0D1529);border:1px solid var(--border)!important;}
.fab-overlay{position:fixed;inset:0;z-index:148;display:none;}
.fab-overlay.on{display:block;}

/* ── NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#0D1225;border-top:1px solid var(--border);display:flex;padding:6px 0 env(safe-area-inset-bottom,6px);z-index:100;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px;cursor:pointer;color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;border:none;background:transparent;font-family:'DM Mono',monospace;}
.ni .ico{font-size:20px;}
.ni.on{color:var(--cyan);}

/* ── MODAL ── */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:300;align-items:flex-end;justify-content:center;}
.mbg.on{display:flex;}
.modal{background:#111827;border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;animation:sup .22s ease;}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;padding:11px 13px;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan);}
.field select option{background:#111827;}
.field textarea{resize:none;height:80px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sep{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin:14px 0 10px;padding-top:14px;border-top:1px solid var(--border);}
.pzone{border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;position:relative;cursor:pointer;}
.pzone input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}
.pzone .pi{font-size:22px;margin-bottom:5px;}
.pzone .pl{font-size:12px;color:var(--muted);pointer-events:none;}
.pgrid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.pitem{position:relative;width:80px;height:80px;}
.pitem img{width:80px;height:80px;object-fit:cover;border-radius:9px;border:1px solid var(--border);}
.prm{position:absolute;top:-6px;right:-6px;width:22px;height:22px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;border:none;color:#fff;font-weight:700;}
.mbtns{display:flex;gap:10px;margin-top:16px;}
.bcancel{flex:1;padding:13px;background:transparent;border:1px solid var(--border);border-radius:9px;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;}
.bsave{flex:2;padding:13px;border:none;border-radius:9px;color:#fff;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;cursor:pointer;}
.bsave.sav{background:linear-gradient(90deg,var(--orange),#CC5500);}
.bsave.cmd{background:linear-gradient(90deg,var(--blue),#0044CC);}
.bsave.cli{background:linear-gradient(90deg,var(--cyan),var(--blue));}

/* ── TOAST ── */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--red);border-radius:12px;padding:14px 18px;z-index:999;display:flex;align-items:center;gap:12px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.5);white-space:nowrap;}

/* ── FICHE CLIENT ── */
#fiche{display:none;position:fixed;inset:0;background:var(--dark);z-index:400;overflow-y:auto;padding-bottom:80px;}
#fiche.on{display:block;}
.fiche-header{background:linear-gradient(135deg,#0A0E1A,#0D1529);padding:14px 16px;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.fiche-back{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;}
.fiche-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;flex:1;}
.fiche-body{padding:16px;}
.f-sec{margin-bottom:20px;}
.f-sec-title{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.iitem{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:10px;}
.iitem.full{grid-column:1/-1;}
.ilabel{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.ival{font-size:13px;color:var(--text);}
.ival.em{color:var(--muted);font-style:italic;}
.photos-tabs{display:flex;gap:8px;margin-bottom:12px;}
.ptab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;}
.ptab.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.1);}
.photos-grid{display:flex;flex-wrap:wrap;gap:8px;}
.p-add{width:80px;height:80px;border-radius:10px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;position:relative;flex-shrink:0;}
.p-add input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}
.p-tile{position:relative;width:80px;height:80px;flex-shrink:0;}
.p-tile img{width:80px;height:80px;object-fit:cover;border-radius:10px;border:1px solid var(--border);cursor:pointer;}
.p-tile-del{position:absolute;top:-5px;right:-5px;width:20px;height:20px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;border:none;color:#fff;font-weight:700;}
.hist-item{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.hist-item-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:5px;}
.hist-tags{display:flex;gap:6px;flex-wrap:wrap;}

/* ── PRIORITÉS ── */
.prio-urgent::before{background:var(--red)!important;animation:blink 1.2s infinite!important;}
.prio-standard::before{background:var(--yellow)!important;}
.prio-attendre::before{background:var(--blue)!important;}
.prio-express::before{background:var(--red)!important;animation:blink 1.2s infinite!important;}

.prio-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;margin-bottom:6px;}
.prio-badge.urgent{background:rgba(255,58,92,.15);color:var(--red);border:1px solid rgba(255,58,92,.3);}
.prio-badge.standard{background:rgba(255,214,0,.15);color:var(--yellow);border:1px solid rgba(255,214,0,.3);}
.prio-badge.attendre{background:rgba(0,87,255,.15);color:#6699FF;border:1px solid rgba(0,87,255,.3);}
.prio-badge.express{background:rgba(255,58,92,.15);color:var(--red);border:1px solid rgba(255,58,92,.3);}
.prio-badge.std-cmd{background:rgba(0,87,255,.15);color:#6699FF;border:1px solid rgba(0,87,255,.3);}

/* ── HISTORIQUE ── */
.hist-log{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.hist-log-title{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.hist-log-item{font-size:11px;color:var(--muted);padding:4px 0;display:flex;align-items:flex-start;gap:6px;border-bottom:1px solid rgba(255,255,255,.04);}
.hist-log-item:last-child{border-bottom:none;}
.hist-log-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;margin-top:4px;}
.hist-log-dot.rouge{background:var(--red);}
.hist-log-dot.jaune{background:var(--yellow);}
.hist-log-dot.vert{background:var(--green);}
.hist-log-dot.bleu{background:var(--cyan);}

/* ── LIGHTBOX ── */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:600;flex-direction:column;align-items:center;justify-content:center;}
.lb.on{display:flex;}
.lb img{max-width:96vw;max-height:80vh;object-fit:contain;border-radius:10px;}
.lbnav{display:flex;align-items:center;gap:20px;margin-top:18px;}
.lbbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:9px;color:#fff;padding:10px 20px;font-family:'DM Mono',monospace;font-size:17px;cursor:pointer;}
.lbcnt{color:var(--muted);font-size:12px;min-width:60px;text-align:center;}
.lbclose{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;border-radius:50%;width:38px;height:38px;color:#fff;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.tag{font-size:10px;padding:3px 8px;border-radius:20px;letter-spacing:.8px;text-transform:uppercase;font-weight:500;}
.t-ap{background:rgba(255,122,0,.15);color:var(--orange);border:1px solid rgba(255,122,0,.3);}
.t-en{background:rgba(255,214,0,.15);color:var(--yellow);border:1px solid rgba(255,214,0,.3);}
.t-te{background:rgba(0,232,122,.15);color:var(--green);border:1px solid rgba(0,232,122,.3);}
.t-ac{background:rgba(255,214,0,.15);color:var(--yellow);border:1px solid rgba(255,214,0,.3);}
.t-co{background:rgba(0,87,255,.15);color:#6699FF;border:1px solid rgba(0,87,255,.3);}
.t-re{background:rgba(0,232,122,.15);color:var(--green);border:1px solid rgba(0,232,122,.3);}
.t-tc{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.2);}
.t-mu{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border);}
.t-uh{background:rgba(255,58,92,.15);color:var(--red);border:1px solid rgba(255,58,92,.3);}
.t-un{background:rgba(0,87,255,.15);color:#6699FF;border:1px solid rgba(0,87,255,.3);}
.t-ub{background:rgba(90,112,144,.15);color:var(--muted);border:1px solid rgba(90,112,144,.3);}

<script>
// ── CONFIG FIREBASE ───────────────────────────────────────────
// Laisser vide ('') pour fonctionner en mode local uniquement (localStorage)
// Remettre l'URL pour la synchro multi-appareils en production (Netlify)
const FIREBASE_URL = 'https://team-eps-c8a5c-default-rtdb.europe-west1.firebasedatabase.app';

async function fbGet(path) {
  if (!FIREBASE_URL) return null;
  try {
    const r = await fetch(FIREBASE_URL + path + '.json');
    return r.ok ? r.json() : null;
  } catch { return null; }
}
async function fbPut(path, data) {
  if (!FIREBASE_URL) return;
  try {
    await fetch(FIREBASE_URL + path + '.json', { method: 'PUT', body: JSON.stringify(data) });
  } catch {}
}
async function fbDel(path) {
  if (!FIREBASE_URL) return;
  try {
    await fetch(FIREBASE_URL + path + '.json', { method: 'DELETE' });
  } catch {}
}

// ── PIN ───────────────────────────────────────────────────────
const PIN = '1987';
let pinVal = '';

function pinKey(k) {
  if (pinVal.length >= 4) return;
  pinVal += k;
  updatePinDots();
  if (pinVal.length === 4) setTimeout(checkPin, 120);
}
function pinClear() {
  pinVal = pinVal.slice(0, -1);
  updatePinDots();
}
function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('pd' + i);
    d.classList.toggle('filled', i < pinVal.length);
    d.classList.remove('error');
  }
}
function checkPin() {
  if (pinVal === PIN) {
    sessionStorage.setItem('eps-pin', '1');
    document.getElementById('pin-screen').style.display = 'none';
    // FIX: aller directement à l'app si l'utilisateur est déjà connu
    if (user) showApp();
    else document.getElementById('login').style.display = '';
  } else {
    document.getElementById('pin-error').textContent = 'Code incorrect';
    for (let i = 0; i < 4; i++) document.getElementById('pd' + i).classList.add('error');
    setTimeout(() => {
      pinVal = '';
      updatePinDots();
      document.getElementById('pin-error').textContent = '';
    }, 800);
  }
}

// FIX: si PIN déjà validé dans cette session, passer directement
if (sessionStorage.getItem('eps-pin') === '1') {
  document.getElementById('pin-screen').style.display = 'none';
  if (localStorage.getItem('eps-user')) {
    // showApp() sera appelé après les déclarations de variables
  } else {
    document.getElementById('login').style.display = '';
  }
}

// ── DATA ──────────────────────────────────────────────────────
let user = localStorage.getItem('eps-user');
let savs    = JSON.parse(localStorage.getItem('eps-savs') || '[]');
let cmds    = JSON.parse(localStorage.getItem('eps-cmds') || '[]');
let clients = JSON.parse(localStorage.getItem('eps-clis') || '[]');
let fSav = 'tous', fCmd = 'tous';
let eid = null;
let tp = { sav: [], cmd: [] };
let lbPh = [], lbI = 0;
let currentFiche = null;
let fichePhTab = 'installation';
let syncTimer = null;
const avc = { Thomas: 'av-T', Swann: 'av-S', Mathieu: 'av-M' };

function save() {
  localStorage.setItem('eps-savs', JSON.stringify(savs));
  localStorage.setItem('eps-cmds', JSON.stringify(cmds));
  localStorage.setItem('eps-clis', JSON.stringify(clients));
}

function setSyncDot(state) {
  const d = document.getElementById('sync-dot');
  if (!d) return;
  d.className = 'sync-dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
}

// ── FIREBASE SYNC ─────────────────────────────────────────────
async function syncItem(type, item) {
  if (!FIREBASE_URL) return;
  setSyncDot('');
  const path = { sav: '/savs', cmd: '/cmds', cli: '/clients' }[type];
  try {
    await fbPut(path + '/' + item.id, item);
    setSyncDot('ok');
  } catch { setSyncDot('err'); }
}

async function syncDelete(type, id) {
  if (!FIREBASE_URL) return;
  const path = { sav: '/savs', cmd: '/cmds', cli: '/clients' }[type];
  try { await fbDel(path + '/' + id); } catch {}
}

async function syncWithFirebase() {
  if (!FIREBASE_URL) return;
  setSyncDot('');
  try {
    const [fs, fc, fcl] = await Promise.all([
      fbGet('/savs'), fbGet('/cmds'), fbGet('/clients')
    ]);
    let changed = false;
    const uploads = [];

    function mergeAndUpload(local, fbData, fbPath) {
      if (!fbData && local.length === 0) return local;
      const fbMap = fbData || {};
      const fbIds = new Set(Object.keys(fbMap));
      // Merge Firebase → local (Firebase gagne si ts plus récent)
      Object.entries(fbMap).forEach(([id, v]) => {
        const item = { ...v, id };
        const idx = local.findIndex(x => x.id === id);
        if (idx === -1) { local.push(item); changed = true; }
        else if ((item.ts || 0) > (local[idx].ts || 0)) { local[idx] = item; changed = true; }
      });
      // Uploader les items locaux absents de Firebase (créés hors-ligne)
      local.forEach(item => {
        if (!fbIds.has(item.id)) uploads.push(fbPut(fbPath + '/' + item.id, item));
      });
      return local;
    }

    savs    = mergeAndUpload(savs, fs, '/savs');
    cmds    = mergeAndUpload(cmds, fc, '/cmds');
    clients = mergeAndUpload(clients, fcl, '/clients');

    if (uploads.length) await Promise.all(uploads);
    if (changed) { save(); renderAll(); }
    setSyncDot('ok');
  } catch { setSyncDot('err'); }
}

function startSync() {
  syncWithFirebase();
  if (syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(syncWithFirebase, 15000);
}

// ── LOGS ──────────────────────────────────────────────────────
function addLog(item, msg) {
  if (!item.logs) item.logs = [];
  const now = new Date();
  const date = now.toLocaleDateString('fr-FR');
  const time = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  item.logs.push({ msg, by: user, date, time });
}

function logHTML(item) {
  if (!item.logs || !item.logs.length) return '';
  const dotColor = (msg) => {
    if (msg.includes('Créé')) return 'bleu';
    if (msg.includes('terminé') || msg.includes('reçu')) return 'vert';
    if (msg.includes('urgent') || msg.includes('express') || msg.includes('Urgent') || msg.includes('Express')) return 'rouge';
    if (msg.includes('cours') || msg.includes('commandé')) return 'jaune';
    return '';
  };
  return `<div class="hist-log">
    <div class="hist-log-title">Historique</div>
    ${[...item.logs].reverse().map(l => `
      <div class="hist-log-item">
        <div class="hist-log-dot ${dotColor(l.msg)}"></div>
        <span><strong style="color:var(--text)">${l.by}</strong> — ${l.msg} <span style="color:rgba(255,255,255,.3)">· ${l.date} ${l.time}</span></span>
      </div>`).join('')}
  </div>`;
}

// ── BADGES / PRIORITÉS ────────────────────────────────────────
function prioBadgeSav(p) {
  const m = { urgent: ['urgent','🔴 Urgent'], standard: ['standard','🟡 Standard'], attendre: ['attendre','🔵 Peut attendre'] };
  const [cls, lbl] = m[p] || ['standard','🟡 Standard'];
  return `<span class="prio-badge ${cls}">${lbl}</span>`;
}
function prioBadgeCmd(p) {
  const m = { express: ['express','🔴 Express'], standard: ['std-cmd','🔵 Standard'] };
  const [cls, lbl] = m[p] || ['std-cmd','🔵 Standard'];
  return `<span class="prio-badge ${cls}">${lbl}</span>`;
}
function prioClassSav(p) {
  return { urgent: 'prio-urgent', standard: 'prio-standard', attendre: 'prio-attendre' }[p] || 'prio-standard';
}

// ── LOGIN ─────────────────────────────────────────────────────
function login(n) { user = n; localStorage.setItem('eps-user', n); showApp(); }
function logout() { localStorage.removeItem('eps-user'); location.reload(); }
function showApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').classList.add('on');
  const av = document.getElementById('hav');
  av.className = 'mav ' + (avc[user] || '');
  av.textContent = user[0];
  document.getElementById('hname').textContent = user;
  renderAll();
  startSync();
}
if (user) showApp();

// ── TABS ──────────────────────────────────────────────────────
function goTab(name) {
  ['home','sav','cmd','cli'].forEach(t => {
    document.getElementById('sec-' + t).classList.toggle('on', t === name);
    document.getElementById('tab-' + t).classList.toggle('on', t === name);

// ── PHOTOS ────────────────────────────────────────────────────
function compress(file, cb) {
  const r = new FileReader();
  r.onload = e => {
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas');
      const MAX = 800; let w = img.width, h = img.height;
      if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h * MAX / w); w = MAX; } else { w = Math.round(w * MAX / h); h = MAX; } }
      cv.width = w; cv.height = h; cv.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(cv.toDataURL('image/jpeg', .72));
    };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}
function addPh(type, input) {
  Promise.all(Array.from(input.files).map(f => new Promise(res => compress(f, res)))).then(r => { tp[type].push(...r); renderPG(type); });
}
function rmPh(type, i) { tp[type].splice(i, 1); renderPG(type); }
function renderPG(type) {
  document.getElementById('pg-' + type).innerHTML = tp[type].map((s, i) => `<div class="pitem"><img src="${s}"><button class="prm" onclick="rmPh('${type}',${i})">✕</button></div>`).join('');
}

// ── ALERTES ───────────────────────────────────────────────────
function age(ts) { return ts ? Math.floor((Date.now() - ts) / 86400000) : 0; }
function alertSav(s) {
  if (s.statut === 'terminé') return { cls: '', pill: '' };
  const d = age(s.ts);
  if (s.statut === 'à planifier' && d >= 7) return { cls: 'urgent', pill: `<span class="alert-pill alert-rouge">🔴 ${d}j sans planification</span>` };
  if (s.statut === 'à planifier' && d >= 3) return { cls: '', pill: `<span class="alert-pill alert-orange">⚠️ ${d}j sans planification</span>` };
  if (s.statut === 'en cours' && d >= 10) return { cls: 'urgent', pill: `<span class="alert-pill alert-rouge">🔴 ${d}j en cours</span>` };
  if (s.statut === 'en cours' && d >= 5) return { cls: '', pill: `<span class="alert-pill alert-orange">⚠️ ${d}j en cours</span>` };
  return { cls: '', pill: '' };
}
function alertCmd(c) {
  if (c.statut === 'reçu') return { pill: '' };
  // FIX: urgence express (ancienne valeur 'haute' corrigée)
  if (c.urgence === 'express') return { pill: '<span class="alert-pill alert-rouge">🔴 Express</span>' };
  const d = age(c.ts);
  if (d >= 5) return { pill: `<span class="alert-pill alert-orange">⚠️ ${d}j en attente</span>` };
  return { pill: '' };
}

function updateBadges() {

  const nc = cmds.filter(c => c.statut !== 'reçu').length;
  const bs = document.getElementById('badge-sav');
  const bc = document.getElementById('badge-cmd');
  bs.textContent = ns; bs.style.display = ns ? '' : 'none';
  bc.textContent = nc; bc.style.display = nc ? '' : 'none';
}

function renderHome() {
  const prioOrderSav = { urgent: 0, standard: 1, attendre: 2 };
  const actifs = savs.filter(s => s.statut !== 'terminé').sort((a, b) => {
    const pa = prioOrderSav[a.prio || 'standard'];
    const pb = prioOrderSav[b.prio || 'standard'];
    if (pa !== pb) return pa - pb;
    return (a.ts || 0) - (b.ts || 0);
  });
  document.getElementById('home-sav-count').textContent = actifs.length || '';
  document.getElementById('home-sav').innerHTML = actifs.length
    ? actifs.map(s => savCardHTML(s)).join('')
    : `<div class="empty"><div class="ei">✅</div>Aucun SAV en cours</div>`;

  const prioOrderCmd = { express: 0, standard: 1 };
  const actifsc = cmds.filter(c => c.statut !== 'reçu').sort((a, b) => {
    const pa = prioOrderCmd[a.urgence || 'standard'];
    const pb = prioOrderCmd[b.urgence || 'standard'];
    if (pa !== pb) return pa - pb;
    return (a.ts || 0) - (b.ts || 0);
  });
  document.getElementById('home-cmd-count').textContent = actifsc.length || '';
  document.getElementById('home-cmd').innerHTML = actifsc.length
    ? actifsc.map(c => cmdCardHTML(c)).join('')
    : `<div class="empty"><div class="ei">✅</div>Aucune commande en attente</div>`;
}

        </div>
        <div style="display:flex;gap:6px" onclick="event.stopPropagation()">
          <button class="act-btn act-edit" style="padding:8px 10px" onclick="openEdit('cli','${c.id}')">✏️</button>
          <button class="act-btn act-del" style="padding:8px 10px" onclick="delItem('cli','${c.id}')">🗑️</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <div style="flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--orange)">${nbSav(c.id)}</div>
          <div style="font-size:10px;color:var(--muted)">SAV</div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--blue)">${nbCmd(c.id)}</div>
          <div style="font-size:10px;color:var(--muted)">Commandes</div>
        </div>
      </div>
    </div>`).join('') : `<div class="empty"><div class="ei">👤</div>${q ? 'Aucun résultat' : 'Aucun client'}</div>`;
}

// ── FICHE CLIENT ──────────────────────────────────────────────
function openFiche(id) { currentFiche = id; fichePhTab = 'installation'; renderFiche(id); document.getElementById('fiche').classList.add('on'); }
function closeFiche() { document.getElementById('fiche').classList.remove('on'); currentFiche = null; }
function renderFiche(id) {
  const c = clients.find(x => x.id === id); if (!c) return;
  document.getElementById('fiche-nom').textContent = c.nom + ' ' + c.prenom;
  document.getElementById('fiche-edit-btn').onclick = () => openEdit('cli', id);
  const phI = c.photosInstallation || []; const phE = c.photosEquipement || [];
  const allPh = fichePhTab === 'installation' ? phI : phE;
  const cliSavs = savs.filter(s => s.clientId === id).sort((a, b) => b.ts - a.ts);
  const cliCmds = cmds.filter(x => x.clientId === id).sort((a, b) => b.ts - a.ts);
  document.getElementById('fiche-body').innerHTML = `
    <div class="f-sec"><div class="f-sec-title">Coordonnées</div>
      <div class="info-grid">
        <div class="iitem"><div class="ilabel">Téléphone</div><div class="ival ${!c.tel ? 'em' : ''}">${c.tel || '—'}</div></div>
        <div class="iitem"><div class="ilabel">Email</div><div class="ival em">—</div></div>
        <div class="iitem full"><div class="ilabel">Adresse</div><div class="ival ${!c.adresse ? 'em' : ''}">${c.adresse || '—'}</div></div>
      </div>
    </div>
    <div class="f-sec"><div class="f-sec-title">Piscine</div>
      <div class="info-grid">
        <div class="iitem"><div class="ilabel">Type</div><div class="ival ${!c.typePiscine ? 'em' : ''}">${c.typePiscine || '—'}</div></div>
        <div class="iitem"><div class="ilabel">Dimensions</div><div class="ival ${!c.dims ? 'em' : ''}">${c.dims || '—'}</div></div>
        <div class="iitem"><div class="ilabel">Filtration</div><div class="ival ${!c.filtration ? 'em' : ''}">${c.filtration || '—'}</div></div>
        <div class="iitem"><div class="ilabel">Traitement</div><div class="ival ${!c.traitement ? 'em' : ''}">${c.traitement || '—'}</div></div>
        ${c.pompe ? `<div class="iitem full"><div class="ilabel">Pompe</div><div class="ival">${c.pompe}</div></div>` : ''}
        ${c.filtre ? `<div class="iitem full"><div class="ilabel">Filtre</div><div class="ival">${c.filtre}</div></div>` : ''}
        ${c.equip ? `<div class="iitem full"><div class="ilabel">Autres</div><div class="ival">${c.equip}</div></div>` : ''}
        ${c.notes ? `<div class="iitem full"><div class="ilabel">Notes</div><div class="ival">${c.notes}</div></div>` : ''}
      </div>
    </div>
    <div class="f-sec"><div class="f-sec-title">Photos</div>
      <div class="photos-tabs">
        <button class="ptab ${fichePhTab === 'installation' ? 'on' : ''}" onclick="switchPhTab('installation')">🏊 Installation (${phI.length})</button>
        <button class="ptab ${fichePhTab === 'equipement' ? 'on' : ''}" onclick="switchPhTab('equipement')">⚙️ Équipements (${phE.length})</button>
      </div>
      <div class="photos-grid">
        <div class="p-add"><input type="file" accept="image/*" multiple onchange="addFichePh(this)">📷</div>
        ${allPh.map((src, i) => `<div class="p-tile"><img src="${src}" onclick="lbArr(${JSON.stringify(allPh).replace(/"/g, '&quot;')},${i})"><button class="p-tile-del" onclick="delFichePh(${i})">✕</button></div>`).join('')}
      </div>
    </div>
    <div class="f-sec"><div class="f-sec-title">SAV (${cliSavs.length})</div>
      ${cliSavs.map(s => `<div class="hist-item"><div class="hist-item-title">${s.action || 'Intervention'}</div><div class="hist-tags">${savStTag(s.statut)}${s.tech ? `<span class="tag t-tc">👷 ${s.tech}</span>` : ''}${s.created ? `<span class="tag t-mu">📅 ${s.created}</span>` : ''}</div></div>`).join('') || '<div style="font-size:12px;color:var(--muted);padding:6px 0">Aucun SAV</div>'}
    </div>
    <div class="f-sec"><div class="f-sec-title">Commandes (${cliCmds.length})</div>
      ${cliCmds.map(c => `<div class="hist-item"><div class="hist-item-title">${c.article || 'Commande'}</div><div class="hist-tags">${cmdStTag(c.statut)}${urgTagCmd(c.urgence)}${c.created ? `<span class="tag t-mu">📅 ${c.created}</span>` : ''}</div></div>`).join('') || '<div style="font-size:12px;color:var(--muted);padding:6px 0">Aucune commande</div>'}
    </div>`;
}
function switchPhTab(t) { fichePhTab = t; renderFiche(currentFiche); }
function addFichePh(input) {
  const c = clients.find(x => x.id === currentFiche); if (!c) return;
  Promise.all(Array.from(input.files).map(f => new Promise(res => compress(f, res)))).then(r => {
    if (fichePhTab === 'installation') c.photosInstallation = (c.photosInstallation || []).concat(r);
    else c.photosEquipement = (c.photosEquipement || []).concat(r);
    save(); syncItem('cli', c); renderFiche(currentFiche);
  });
}
function delFichePh(i) {
  const c = clients.find(x => x.id === currentFiche); if (!c) return;
  const arr = fichePhTab === 'installation' ? c.photosInstallation : c.photosEquipement;
  arr.splice(i, 1); save(); syncItem('cli', c); renderFiche(currentFiche);
}
function lbArr(photos, idx) { lbOpen(encodeURIComponent(JSON.stringify(photos)), idx); }

// ── EVENTS ────────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  const lb = e.target.closest('[data-lb]');
  if (lb) { lbOpen(lb.dataset.lb, parseInt(lb.dataset.idx)); return; }
});
document.querySelectorAll('.mbg').forEach(bg => bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('on'); }));

// ── LIGHTBOX ──────────────────────────────────────────────────
function lbOpen(enc, idx) { lbPh = JSON.parse(decodeURIComponent(enc)); lbI = idx; document.getElementById('lbimg').src = lbPh[lbI]; document.getElementById('lbcnt').textContent = (lbI + 1) + ' / ' + lbPh.length; document.getElementById('lb').classList.add('on'); }
function lbClose() { document.getElementById('lb').classList.remove('on'); }
function lbGo(d) { lbI = (lbI + d + lbPh.length) % lbPh.length; document.getElementById('lbimg').src = lbPh[lbI]; document.getElementById('lbcnt').textContent = (lbI + 1) + ' / ' + lbPh.length; }
let tx = 0;
document.getElementById('lb').addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.getElementById('lb').addEventListener('touchend', e => { const d = tx - e.changedTouches[0].clientX; if (Math.abs(d) > 50) lbGo(d > 0 ? 1 : -1); });
</script>
</body>
</html>
